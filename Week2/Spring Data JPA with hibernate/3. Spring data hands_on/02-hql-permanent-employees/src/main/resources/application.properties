# In-memory H2 DB so this runs standalone without a MySQL setup.
# To use the ormlearn MySQL schema from the doc instead, replace this
# block with a MySQL datasource (see README) and drop schema/data.sql.
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show every SQL statement Hibernate generates, formatted, so you can
# compare it against the queries shown in the hands-on doc.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.cognizant.ormlearn=DEBUG
