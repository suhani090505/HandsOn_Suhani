# =======================================================================
# Hands on 1 - default profile: runs against an in-memory H2 database so
# the project works immediately without installing MySQL.
# =======================================================================

# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration (H2 in-memory, mimics the 'ormlearn' schema)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# H2 console (optional, browse http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Hibernate configuration
# create-drop is used here (H2 is transient) - see application-mysql.properties
# for the 'validate' setting used against the real MySQL schema per the hands-on doc.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Load starter data (see src/main/resources/data.sql)
spring.jpa.defer-datasource-initialization=true
